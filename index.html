<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uma Surpresa para Você</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #fafafa; color: #1a1a1a; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; text-align: center; padding: 20px; }
        .card { max-width: 400px; width: 100%; opacity: 0; transform: translateY(20px); transition: all 1s ease; }
        .photo-frame { width: 100%; aspect-ratio: 1/1; background: #eee; border-radius: 2px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.08); margin-bottom: 30px; border: 8px solid #fff; }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; }
        h1 { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: normal; font-style: italic; color: #333; margin-bottom: 25px; }
        audio { width: 100%; height: 40px; filter: invert(100%) hue-rotate(180deg) brightness(1.5); }
        .logo { width: 60px; margin-bottom: 50px; opacity: 0.6; }
    </style>
</head>
<body>
    <div id="loading">Carregando...</div>
    <div class="card" id="content">
        <img src="LINK_DA_SUA_LOGO_PNG" class="logo">
        <div class="photo-frame"><img id="foto" src=""></div>
        <h1>"Para quem nos dá o mundo."</h1>
        <audio id="audio" controls></audio>
    </div>

    <script>
        const SB_URL = 'https://modo-fila-supabase.znzrqn.easypanel.host';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyAgCiAgICAicm9sZSI6ICJhbm9uIiwKICAgICJpc3MiOiAic3VwYWJhc2UtZGVtbyIsCiAgICAiaWF0IjogMTY0MTc2OTIwMCwKICAgICJleHAiOiAxNzk5NTM1NjAwCn0.dc_X5iR_VP_qT0zsiyj_I_OZ2T9FtRU2BBNWN8Bu4GE';

        async function load() {
            const id = window.location.pathname.split('/').pop();
            const res = await fetch(`${SB_URL}/rest/v1/campanha_maes?id_tag=eq.${id}`, {
                headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
            });
            const data = await res.json();
            if (data[0]) {
                document.getElementById('foto').src = data[0].url_foto;
                document.getElementById('audio').src = data[0].url_audio;
                document.getElementById('loading').style.display = 'none';
                const c = document.getElementById('content');
                c.style.opacity = '1';
                c.style.transform = 'translateY(0)';
            }
        }
        load();
    </script>
</body>
</html>
